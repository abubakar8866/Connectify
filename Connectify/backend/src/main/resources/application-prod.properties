spring.application.name=connectify
server.port=8080

# ---------------- DATABASE CONFIG ----------------
spring.datasource.url=${db_url}
spring.datasource.username=${db_username}
spring.datasource.password=${db_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---------------- JPA / HIBERNATE ----------------
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.format_sql=false

# ----------------Prod LOGGING ----------------
logging.level.root=WARN
logging.level.com.abubakar.connectify=INFO
logging.file.name=logs/app.log

# ---------------- FILE UPLOAD ----------------
file.upload=/var/www/uploads/
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=10MB

# ---------------- CACHE (REDIS) ----------------
spring.cache.type=simple
spring.data.redis.host=${redis_host}
spring.data.redis.port=${redis_port}
spring.data.redis.password=${redis_password}

# ---------------- JWT ----------------
#JWT(Access) Token ? 1 Day
#Refresh Token ? 30 Days
jwt_initial_secret_key=${jwt_initial_secret_key}
jwt_expiration=${jwt_expiration}
jwt_refresh_expiration=2592000000

# ---------------- TIMEZONE ----------------
spring.jackson.time-zone=UTC

# ---------------- LAZY LOADING ----------------
spring.jpa.open-in-view=false

# ---------------- SWAGGER ----------------
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# ---------------- FRONTEND URL ----------------
app.frontend.url=https://your-domain.com

# ---------------- EMAIL CONFIG ----------------
spring.mail.host=${host}
spring.mail.port=${port}
spring.mail.username=${email_username}
spring.mail.password=${app_password}
spring.mail.properties.mail.smtp.auth=${smtp_auth}
spring.mail.properties.mail.smtp.starttls.enable=${smtp_starttls_enable}
spring.mail.properties.mail.smtp.starttls.required=${smtp_starttls_required}

# ---------------- OAUTH2 (GOOGLE) ----------------
spring.security.oauth2.client.registration.google.client-id=${google_client_id}
spring.security.oauth2.client.registration.google.client-secret=${google_client_secret}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri=${google_redirect_uri}

# ---------------- OAUTH2 (GITHUB) ----------------
spring.security.oauth2.client.registration.github.client-id=${github_client_id}
spring.security.oauth2.client.registration.github.client-secret=${github_client_secret}
spring.security.oauth2.client.registration.github.scope=user:email
spring.security.oauth2.client.registration.github.redirect-uri=${github_redirect_uri}

# ---------------- SECURITY ----------------
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never

# ---------------- SERVER OPTIMIZATION ----------------
server.tomcat.max-threads=200
server.tomcat.min-spare-threads=10
server.connection-timeout=5s

